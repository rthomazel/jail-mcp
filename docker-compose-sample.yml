# this file has example values in the volumes section
volumes:
  jail-mcp-mise:
  jail-mcp-root:

services:
  jail-mcp:
    container_name: jail-mcp-stdio
    image: ghcr.io/rthomazel/jail-mcp:latest
    stdin_open: true
    tty: false
    environment:
      # timeout for exec sync commands
      JAIL_MCP_TIMEOUT: 15s
      # timeout for exec background
      JAIL_MCP_BACKGROUND_TIMEOUT: 5m
    volumes:
      # persistent state: mise installs and shims, Go cache, path snapshot
      - jail-mcp-mise:/mise
      - jail-mcp-root:/root
      # >>> add projects below here <<<
      # host machine path : container path
      - /Users/you/helloworld:/projects/helloworld
